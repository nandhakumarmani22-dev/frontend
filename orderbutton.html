<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .order-form-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .order-form-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
        }

        .order-form-box input,
        .order-form-box textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <!-- Order Form Modal -->
    <div id="orderForm" class="order-form-container" style="display:none;">
        <div class="order-form-box">
            <h3>Food Order</h3>

            <form onsubmit="submitOrder(event)">

                <label>Food Name</label>
                <input type="text" id="foodName" readonly>

                <label>Price</label>
                <input type="text" id="foodPrice" readonly>

                <label>Customer Name</label>
                <input type="text" id="customerName" required>

                <label>Mobile Number</label>
                <input type="tel" id="mobileNumber" required>

                <label>Delivery Address</label>
                <textarea id="address" required></textarea>

                <br><br>

                <button type="submit" class="btn btn-success">Place Order</button>
                <button type="button" class="btn btn-danger" onclick="closeForm()">Cancel</button>

            </form>
        </div>
    </div>
    <script src="javascript.js"></script>
</body>

</html>
