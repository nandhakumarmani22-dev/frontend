<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Food Blog</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f8f9fb;
  color:#333;
}

/* NAVBAR */
nav{
  background:#fff;
  padding:15px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  position:sticky;
  top:0;
  z-index:100;
}

nav h2{
  color:#ff6b35;
}

nav ul{
  list-style:none;
  display:flex;
  gap:20px;
}

nav ul li a{
  text-decoration:none;
  color:#333;
  font-weight:500;
}

/* HERO */
.hero{
  height:70vh;
  background:url("https://source.unsplash.com/1600x900/?indian-food") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
}

.hero h1{
  font-size:40px;
  background:rgba(0,0,0,0.5);
  padding:15px 25px;
  border-radius:10px;
}

/* SEARCH */
.search-box{
  text-align:center;
  margin:40px 0;
}

.search-box input{
  padding:10px;
  width:250px;
  border-radius:20px;
  border:1px solid #ccc;
}

.search-box button{
  padding:10px 18px;
  border:none;
  background:#ff6b35;
  color:#fff;
  border-radius:20px;
  cursor:pointer;
  margin-left:10px;
}

/* SECTION */
.home-food{
  padding:60px 8%;
}

.section-title{
  text-align:center;
  margin-bottom:40px;
  font-size:28px;
}

.section-title span{
  color:#ff6b35;
}

/* GRID */
.food-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* CARD */
.food-card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.4s;
}

.food-card:hover{
  transform:translateY(-10px);
}

.food-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.food-content{
  padding:20px;
  text-align:center;
}

.food-content h3{
  margin-bottom:5px;
}

.food-content p{
  color:#777;
  font-size:14px;
  margin-bottom:15px;
}

.food-content button{
  background:#ff6b35;
  border:none;
  padding:8px 18px;
  color:#fff;
  border-radius:20px;
  cursor:pointer;
}

.hide{
  display:none;
}

/* FOOTER */
footer{
  background:#222;
  color:#fff;
  text-align:center;
  padding:20px;
  margin-top:50px;
}

</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <h2>Foodie</h2>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#foodsection">Foods</a></li>
    <li><a href="#">Blogs</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Discover Authentic Indian Recipes</h1>
</section>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search food...">
  <button onclick="searchFood()">Search</button>
</div>

<!-- FOOD SECTION -->
<section class="home-food" id="foodsection">
  <h2 class="section-title"><span>Popular</span> Indian Foods</h2>

  <div class="food-grid">

    <div class="food-card">
      <img src="https://source.unsplash.com/400x300/?butter-chicken" alt="">
      <div class="food-content">
        <h3>Butter Chicken</h3>
        <p>Punjab</p>
        <button>View Recipe</button>
      </div>
    </div>

    <div class="food-card">
      <img src="https://source.unsplash.com/400x300/?biryani" alt="">
      <div class="food-content">
        <h3>Hyderabadi Biryani</h3>
        <p>Telangana</p>
        <button>View Recipe</button>
      </div>
    </div>

    <div class="food-card">
      <img src="https://source.unsplash.com/400x300/?dosa" alt="">
      <div class="food-content">
        <h3>Masala Dosa</h3>
        <p>Tamil Nadu</p>
        <button>View Recipe</button>
      </div>
    </div>

    <div class="food-card">
      <img src="https://source.unsplash.com/400x300/?fish-curry" alt="">
      <div class="food-content">
        <h3>Fish Curry</h3>
        <p>Kerala</p>
        <button>View Recipe</button>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 Indian Food Blog | Designed by Nandha Kumar
</footer>

<script>
function searchFood(){
  let input=document.getElementById("searchInput").value.toLowerCase();
  let cards=document.querySelectorAll(".food-card");
  let section=document.getElementById("foodsection");
  let found=false;

  cards.forEach(function(card){
    let title=card.querySelector("h3").innerText.toLowerCase();

    if(title.includes(input)){
      card.classList.remove("hide");
      found=true;
    }else{
      card.classList.add("hide");
    }
  });

  if(found && input!==""){
    section.scrollIntoView({behavior:"smooth"});
  }

  if(input===""){
    cards.forEach(card=>card.classList.remove("hide"));
  }
}
</script>

</body>
</html>
